name: Maven Publish

on:
  push:
    branches: ["master", "1.21.11"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Publish to TWME Repository
        env:
          TWME_REPO_USERNAME: ${{ secrets.TWME_REPO_USERNAME }}
          TWME_REPO_PASSWORD: ${{ secrets.TWME_REPO_PASSWORD }}
        run: ./gradlew publishShadowPublicationToTwme-repo-snapshotsRepository --no-daemon
